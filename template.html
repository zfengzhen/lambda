<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambda 策略系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0e17;color:#c8d0dc;line-height:1.6;padding:20px}
.container{max-width:1500px;margin:0 auto}

/* 头部 */
.header{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.header h1{color:#e8ecf1;font-size:26px}

/* 卡片通用 */
.box{background:linear-gradient(135deg,#141b2d,#1a2332);border:1px solid #2a3548;border-radius:12px;padding:20px;margin-bottom:20px}
.box h3{color:#4fc3f7;font-size:17px;margin-bottom:14px}

/* 统计+层级合并为一行 */
.overview-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:stretch}
.overview-row .stat{background:#141b2d;border:1px solid #253044;border-radius:6px;padding:6px 12px;text-align:center;min-width:80px}
.overview-row .stat .v{font-size:16px;font-weight:bold;display:block;line-height:1.2}
.overview-row .stat .v.grn{color:#4caf50}.overview-row .stat .v.red{color:#ef5350}.overview-row .stat .v.gld{color:#ffc107}.overview-row .stat .v.blu{color:#4fc3f7}
.overview-row .stat .d{font-size:9px;color:#6b7b8d;margin-top:1px}
.overview-row .tier-card{border-radius:6px;padding:5px 10px;text-align:center;border:1px solid #253044;flex:1;min-width:110px}
.overview-row .tier-card .tn{font-size:11px;font-weight:bold;display:block;line-height:1.2}
.overview-row .tier-card .tv{font-size:14px;font-weight:bold;display:block;margin:1px 0 0;line-height:1.1}
.overview-row .tier-card .td{font-size:9px;color:#6b7b8d;line-height:1.1;margin-top:0}

/* 决策面板：左决策 右图表 */
.decision-grid{display:grid;grid-template-columns:1fr 1.5fr;gap:24px}

/* 规则检查表 */
.rule-table{width:100%;font-size:12px;margin-bottom:14px}
.rule-table td{padding:6px 0;border-bottom:1px solid #253044}
.rule-label{text-align:left;color:#8b95a5}
.rule-val{text-align:right}
.badge-y{background:#1b5e20;color:#81c784;padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px;display:inline-block}
.badge-n{background:#4a1515;color:#ef9a9a;padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px;display:inline-block}
.conclusion-sell{text-align:center;padding:12px;background:#0a1a0a;border-radius:6px;border:1px solid #1b5e20;margin-bottom:12px}
.conclusion-skip{text-align:center;padding:12px;background:#1a0a0a;border-radius:6px;border:1px solid #4a1515;margin-bottom:12px}
.ops-box{padding:10px;background:#0d1421;border-radius:6px;border:1px solid #253044}
.ops-box .ops-label{color:#546e7a;font-size:11px;margin-bottom:8px}
.ops-table{width:100%;font-size:12px}
.ops-table td{padding:4px 0;border-bottom:1px solid #1a2332}

/* 图表容器 */
.chart-panel{display:flex;flex-direction:column;gap:4px}
.chart-wrap{position:relative;border-radius:8px;overflow:hidden;border:1px solid #253044;background:#141b2d}
.chart-legend{position:absolute;top:4px;left:8px;font-size:11px;color:#8b95a5;z-index:10;pointer-events:none;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.chart-legend-title{color:#546e7a;font-weight:600;margin-right:2px}
.chart-legend .lg-item{display:inline-flex;gap:3px;align-items:center}
.chart-legend .lg-label{color:#546e7a}
.chart-legend .lg-val{font-weight:600;font-family:monospace}

/* 表格 */
.sec-title{color:#e8ecf1;font-size:18px;margin:28px 0 14px;padding-bottom:6px;border-bottom:1px solid #253044}
table.weekly{width:100%;border-collapse:collapse;font-size:12px}
table.weekly thead{position:sticky;top:0;z-index:10}
table.weekly th{background:#1a2332;color:#8b95a5;padding:8px 5px;text-align:center;border-bottom:2px solid #2a3548;font-weight:600;font-size:11px;white-space:nowrap;position:relative}
table.weekly th[data-tip]{cursor:help}
table.weekly th.sortable{cursor:pointer;user-select:none}
table.weekly th.sortable::before{content:'⇅';margin-right:2px;opacity:.4;font-size:10px}
table.weekly th.sortable.sort-asc::before{content:'↑';opacity:.8}
table.weekly th.sortable.sort-desc::before{content:'↓';opacity:.8}
table.weekly th[data-tip]::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);top:calc(100% + 4px);background:rgba(20,27,45,.9);color:#c8d0dc;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:normal;white-space:nowrap;z-index:100;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.4);opacity:0;transition:opacity .2s ease;transition-delay:0s}
table.weekly th[data-tip]:hover::after{opacity:1;transition-delay:1s}
table.weekly td{padding:7px 5px;text-align:center;border-bottom:1px solid #1a2332;white-space:nowrap}
tr.skip-row{background:transparent}tr.skip-row:hover{background:#141b2d}

/* 逐周悬浮决策面板 */
#decisionTooltip{position:fixed;z-index:1000;pointer-events:none;max-width:520px;background:linear-gradient(135deg,#141b2d,#1a2332);border:1px solid #2a3548;border-radius:12px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.6);opacity:0;transition:opacity .15s ease;font-size:13px}
#decisionTooltip.visible{opacity:1}

/* 标签 */
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:bold}
.tag-skip{background:#37474f;color:#78909c}
.tag-pending{background:#1a237e;color:#7986cb;border:1px dashed #5c6bc0}
.pct-pos{color:#4caf50}.pct-neg{color:#ef5350}
.pending-text{color:#7986cb;font-style:italic;font-size:11px}
.bar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle}
.bar-g{background:linear-gradient(90deg,#2e7d32,#4caf50)}.bar-r{background:linear-gradient(90deg,#c62828,#ef5350)}
.cum-bar{display:inline-block;height:14px;background:linear-gradient(90deg,#1565c0,#4fc3f7);border-radius:3px;vertical-align:middle;min-width:2px}
/* 行情快照条 */
.market-bar{margin-bottom:6px;background:#141b2d;border:1px solid #253044;border-radius:8px}
.market-bar .mk-price{font-size:22px;font-weight:bold;color:#e8ecf1}
.market-bar .mk-change{font-size:15px;font-weight:bold;margin-left:4px}
.market-bar .mk-up{color:#22c55e}.market-bar .mk-down{color:#ef4444}
.market-bar .mk-item{font-size:12px;color:#8b95a5}
.market-bar .mk-item .mk-val{color:#c8d0dc;font-weight:600;margin-left:3px}
.market-bar .mk-date{font-size:17px;font-weight:bold;color:#4fc3f7;margin-right:4px}
.safe{color:#4caf50}.danger{color:#ff9800}

/* 过滤标签 */
.filter-chip{display:inline-block;padding:2px 8px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:11px;border:1px solid;opacity:0.4;user-select:none;transition:opacity .15s}
.filter-chip.active{opacity:1}

/* 打印/导出样式 */
@media print{
  body{background:#0a0e17 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .header button{display:none}
  .container{max-width:100%}
  table.weekly thead{position:static}
  .sec-title{display:none !important}
  .risk-note{display:none !important}
  .print-hide{display:none !important}
  tr.print-hide-row{display:none !important}
  .print-only{display:block !important}
}

/* 风险提示 */
.risk-note{margin-top:28px;padding:16px;background:#141b2d;border:1px solid #253044;border-radius:8px;color:#546e7a;font-size:12px;line-height:1.8}
.risk-note strong{color:#8b95a5}

/* 响应式 */
@media(max-width:1100px){.decision-grid{grid-template-columns:1fr}}
@media(max-width:900px){
  .overview-row{flex-wrap:wrap}
  .overview-row .tier-card{min-width:140px}
  table.weekly{font-size:10px}
  table.weekly td,table.weekly th{padding:5px 2px}
}
@media(max-width:600px){
  .overview-row .stat,.overview-row .tier-card{min-width:100%}
}
</style></head><body>
<div class="container">
  <!-- 头部 -->
  <div class="header">
    <h1>Lambda 策略系统</h1>
    <span id="tickerName" style="color:#4fc3f7;font-size:20px;font-weight:bold"></span>
    <div style="flex:1"></div>
    <button onclick="exportPng()" style="background:#253044;color:#8b95a5;border:1px solid #2a3548;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer">导出</button>
  </div>

  <!-- 统计+层级一行 -->
  <div class="overview-row" id="overviewRow"></div>

  <!-- 行情快照+图表 -->
  <div class="chart-panel">
    <div class="market-bar" id="marketBar"></div>
    <div class="chart-wrap">
      <div class="chart-legend" id="klineLegend">
        <span class="chart-legend-title">日K (60天)</span>
      </div>
      <div id="klineChart"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-legend" id="macdLegend">
        <span class="chart-legend-title">MACD</span>
      </div>
      <div id="macdChart"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-legend" id="ivLegend">
        <span class="chart-legend-title">IV (60天)</span>
      </div>
      <div id="ivChart"></div>
    </div>
  </div>

  <!-- 逐周明细 -->
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap" class="sec-title">
    <span>每周策略</span>
    <div id="tierFilter" style="display:inline-flex;gap:4px;font-size:12px"></div>
    <span class="filter-chip active" id="skipToggle" style="color:#78909c;border-color:#78909c" onclick="toggleSkip()">隐藏暂停周</span>
  </div>
  <div class="print-only" style="display:none;color:#8b95a5;font-size:14px;margin:16px 0 8px">最近 8 周策略</div>
  <div style="overflow-x:auto">
    <table class="weekly">
      <thead><tr>
        <th data-tip="每周首个交易日（通常为周一）">日期</th>
        <th data-tip="策略分层：A 企稳双撑 / B1 回调均线 / B2 超跌支撑 / B3 趋势动能弱 / B4 低波整理 / C1 跌势减速 / C2 趋势延续 / C3 过热追涨 / C4 加速下杀">层级</th>
        <th data-tip="Out of The Money，虚值程度">OTM</th>
        <th data-tip="入场日收盘价">收盘</th>
        <th data-tip="行权价向下取整对应的Put期权合约（含DTE天数）">期权合约</th>
        <th data-tip="入场日该期权合约的收盘价（权利金）">权利金</th>
        <th data-tip="入场日到到期日的日K蜡烛图">日K</th>
        <th data-tip="到期日收盘价（非交易日取前一个交易日），点击排序" data-sort="expiry_close" class="sortable">到期价</th>
        <th data-tip="(到期价 - 行权价) / 行权价 × 100%，正=未被行权，负=被行权，点击排序" data-sort="settle_diff" class="sortable">结算差比</th>
        <th data-tip="结算差比 > 0 即平稳到期（未被行权）">平稳到期</th>
        <th data-tip="未平稳到期时，到期后股价恢复到行权价以上所需自然日数，点击排序" data-sort="recovery_days" class="sortable">恢复天数</th>
        <th data-tip="入场日标的级隐含波动率（B-S反算加权）">IV</th>
      </tr></thead>
      <tbody id="weeklyBody"></tbody>
    </table>
  </div>

  <!-- 风险提示 -->
  <div class="risk-note">
    <strong>风险提示:</strong> 本策略仅为量化回测研究，不构成任何投资建议。Sell Put 存在潜在无限亏损风险，实际交易需考虑保证金、流动性、滑点等因素。历史表现不代表未来收益，请在充分理解风险后谨慎操作。
  </div>
</div>

<!-- 悬浮决策面板 -->
<div id="decisionTooltip"></div>

<script>
/* ===== 常量 ===== */
const TIER_COLORS = {
  A:  {color:'#69f0ae', bg:'#0d2b1a'},
  B1: {color:'#b2ebf2', bg:'#0d2228'},
  B2: {color:'#4dd0e1', bg:'#0d1f25'},
  B3: {color:'#0097a7', bg:'#0d191f'},
  B4: {color:'#ffca28', bg:'#2b250d'},
  C1: {color:'#ffa726', bg:'#2b200d'},
  C2: {color:'#e57373', bg:'#2b1a1a'},
  C3: {color:'#ef5350', bg:'#2b0d0d'},
  C4: {color:'#e53935', bg:'#2b0d0d'}
};
const TIER_NAMES = {A:'企稳双撑',B1:'回调均线',B2:'超跌支撑',B3:'趋势动能弱',B4:'低波整理',C1:'跌势减速',C2:'趋势延续',C3:'过热追涨',C4:'加速下杀'};
const activeTiers = new Set(['A','B1','B2','B3','B4','C1','C2','C3','C4']);
let currentWeeks = [];

/* ===== 工具函数 ===== */
function fmt(v, d=2) { return v != null ? v.toFixed(d) : '-'; }
function sign(v, d=2) { return v != null ? (v >= 0 ? '+' : '') + v.toFixed(d) : '-'; }
function pctClass(v) { return v >= 0 ? 'pct-pos' : 'pct-neg'; }

/* ===== 渲染：统计+层级一行 ===== */
function renderOverview(summary, tiers) {
  const s = summary;
  const safeRateCls = s.safe_rate >= 90 ? 'grn' : s.safe_rate >= 70 ? 'gld' : 'red';

  let html = `<div class="stat"><span class="v ${safeRateCls}">${s.safe_rate}%</span><span class="d">平稳到期 ${s.safe_count}/${s.settled}</span></div>`;
  html += `<div class="stat"><span class="v blu">${s.total_weeks}</span><span class="d">总周数</span></div>`;

  const order = ['A','B1','B2','B3','B4','C1','C2','C3','C4'];
  html += order.map(k => {
    const t = tiers[k];
    if (!t) return '';
    const tc = TIER_COLORS[k];
    const rateCls = t.safe_rate >= 100 ? '#4caf50' : t.safe_rate >= 80 ? '#ffc107' : '#ef5350';
    const extra = t.count > t.settled ? ' (含进行中)' : '';
    return `<div class="tier-card" style="background:${tc.bg};cursor:pointer" onclick="filterByTier('${k}')">
      <span class="tn" style="color:${tc.color}">${k} ${t.name}</span>
      <span class="tv" style="color:${rateCls}">${t.safe_count}/${t.settled} ${t.safe_rate}%</span>
      <span class="td">${t.otm}%OTM | ${t.count}笔${extra}</span>
    </div>`;
  }).join('');

  document.getElementById('overviewRow').innerHTML = html;
}

/* ===== 通用：构建决策面板 HTML ===== */
function buildDecisionHtml(data, title) {
  const r = data.rules;
  const close = data.close;

  function row(label, labelColor, desc, pass) {
    const badge = pass
      ? '<span class="badge-y">Y</span>'
      : '<span class="badge-n">N</span>';
    const valColor = pass ? '#81c784' : '#ef9a9a';
    return `<tr><td class="rule-label" style="color:${labelColor}">${label}</td>
      <td class="rule-val"><span style="color:${valColor}">${desc}</span>${badge}</td></tr>`;
  }

  const macdDesc = `|MACD今| ${Math.abs(r.macd_today).toFixed(3)} ${r.macd_narrow ? '<' : '>'} |MACD昨| ${Math.abs(r.macd_yesterday).toFixed(3)}`;
  const p5Desc = `Close ${fmt(close)} ${r.above_p5 ? '>' : '<'} P5_PP ${fmt(r.p5_pp)}`;
  const p30Desc = `Close ${fmt(close)} ${r.above_p30 ? '>' : '<'} P30_PP ${fmt(r.p30_pp)}`;

  const b1_c1 = close < r.ma20;
  const b1_c2 = close > r.ma60;
  const b1_pass = b1_c1 && b1_c2;
  const b1Desc = `Close ${fmt(close)} ${b1_c1 ? '<' : '>'} MA20 ${fmt(r.ma20)} & ${b1_c2 ? '>' : '<'} MA60 ${fmt(r.ma60)}`;

  const b2_c1 = r.dif < 0;
  const b2_c2 = close > r.p30_pp;
  const b2_pass = b2_c1 && b2_c2;
  const b2Desc = `DIF ${fmt(r.dif)} ${b2_c1 ? '<' : '>'} 0 & Close ${fmt(close)} ${b2_c2 ? '>' : '<'} P30_PP ${fmt(r.p30_pp)}`;

  const b3_c1 = r.ma20 > r.ma60;
  const b3_c2 = r.dif < 0;
  const b3_pass = b3_c1 && b3_c2;
  const b3Desc = `MA20 ${fmt(r.ma20)} ${b3_c1 ? '>' : '<'} MA60 ${fmt(r.ma60)} & DIF ${fmt(r.dif)} ${b3_c2 ? '<' : '>'} 0`;

  const b4_c1 = r.hist_vol < 50;
  const b4_c2 = Math.abs(r.ma20_dist) <= 4.5;
  const b4_pass = b4_c1 && b4_c2;
  const b4Desc = `Vol ${fmt(r.hist_vol,1)}% ${b4_c1 ? '<' : '>'} 50% & |MA20距| ${fmt(Math.abs(r.ma20_dist),2)}% ${b4_c2 ? '<=' : '>'} 4.5%`;

  const tierLabel = `${data.tier} ${TIER_NAMES[data.tier] || ''}`;

  return `
    <div style="background:#141b2d;border:1px solid #253044;border-radius:8px;padding:16px">
      <div style="font-size:14px;margin-bottom:14px">
        <span style="color:#8b95a5">收盘价</span>
        <span style="color:#e8ecf1;font-size:22px;font-weight:bold;margin-left:8px">${fmt(close)}</span>
      </div>
      <table class="rule-table">
        ${row('A ' + TIER_NAMES.A, TIER_COLORS.A.color, macdDesc, r.macd_narrow)}
        ${row('', TIER_COLORS.A.color, p5Desc, r.above_p5)}
        ${row('', TIER_COLORS.A.color, p30Desc, r.above_p30)}
        ${row('B1 ' + TIER_NAMES.B1, TIER_COLORS.B1.color, b1Desc, b1_pass)}
        ${row('B2 ' + TIER_NAMES.B2, TIER_COLORS.B2.color, b2Desc, b2_pass)}
        ${row('B3 ' + TIER_NAMES.B3, TIER_COLORS.B3.color, b3Desc, b3_pass)}
        ${row('B4 ' + TIER_NAMES.B4, TIER_COLORS.B4.color, b4Desc, b4_pass)}
        ${(() => {
          if (!data.tier || !data.tier.startsWith('C')) return '';
          const aboveMa20 = close >= r.ma20;
          const aboveMa60 = r.above_ma60 !== undefined ? r.above_ma60 : close >= r.ma60;
          const ma20Abs = Math.abs(r.ma20_dist);
          const overextend = ma20Abs > 10;
          const cColor = TIER_COLORS[data.tier] ? TIER_COLORS[data.tier].color : '#ff8a80';
          if (aboveMa20) {
            const subTier = overextend ? 'C3' : 'C2';
            return row('C 兜底观望', cColor,
              'Close ' + fmt(close) + (aboveMa20 ? ' ≥ ' : ' < ') + 'MA20 ' + fmt(r.ma20) + ' | |偏离| ' + fmt(ma20Abs,1) + '% ' + (overextend ? '>' : '≤') + ' 10%', true)
              + row(subTier + ' ' + TIER_NAMES[subTier], TIER_COLORS[subTier].color,
              overextend ? '偏离过大，超买回调风险' : '偏离合理，趋势延续中', true);
          } else if (!aboveMa60) {
            const subTier = r.macd_narrow ? 'C1' : 'C4';
            return row('C 兜底观望', cColor,
              'Close ' + fmt(close) + ' < MA60 ' + fmt(r.ma60), true)
              + row(subTier + ' ' + TIER_NAMES[subTier], TIER_COLORS[subTier].color,
              r.macd_narrow ? 'MACD 收窄，空头力度递减' : 'MACD 放大，下行动能增强', true);
          }
          return '';
        })()}
      </table>
      ${(() => {
        if (data.skip) {
          return '<div class="conclusion-skip">' +
            '<span style="color:#ef5350;font-size:16px;font-weight:bold">⚠ 暂停卖出</span>' +
            '<div style="color:#8b95a5;font-size:12px;margin-top:6px">' + (data.skip_reason || '连续弱势熔断') + '</div>' +
            '</div>';
        }
        const tc = TIER_COLORS[data.tier] || TIER_COLORS['C1'];
        const cc = tc.color;
        const cls = (data.tier === 'C3' || data.tier === 'C4') ? 'conclusion-skip' : 'conclusion-sell';
        return '<div class="' + cls + '">' +
          '<span style="color:' + cc + ';font-size:16px;font-weight:bold">' + tierLabel + '</span>' +
          '<span style="color:' + cc + ';font-weight:bold;margin-left:12px">' + data.otm + '% OTM</span>' +
          '</div>';
      })()}
      ${data.option_symbol && !data.skip ? `<div style="text-align:center;margin-top:12px">
        <div style="color:#4fc3f7;font-size:15px;font-weight:bold">${data.option_symbol}${data.option_price != null ? `<span style="color:#ce93d8;margin-left:12px">$${data.option_price.toFixed(2)}</span>` : ''}</div>
      </div>` : ''}
    </div>`;
}

/* ===== 渲染：最新决策 ===== */

/* ===== 渲染：行情快照条 ===== */
function renderMarketBar(market) {
  const el = document.getElementById('marketBar');
  if (!market || !el) { if (el) el.style.display = 'none'; return; }
  const up = market.change_pct >= 0;
  const cls = up ? 'mk-up' : 'mk-down';
  const sign = up ? '+' : '';
  // 所有进行中的合约：表格展示
  let contractHtml = '';
  const contracts = market.active_contracts || [];
  if (contracts.length > 0) {
    const today = new Date();
    const td = 'padding:5px 8px;border-bottom:1px solid #1a2332';
    const rows = contracts.map((c, i) => {
      const expiry = new Date(c.expiry + 'T00:00:00');
      const dte = Math.max(0, Math.ceil((expiry - today) / 86400000));
      const strikeDiff = ((market.close - c.strike) / c.strike * 100);
      const sCls = strikeDiff >= 0 ? 'mk-up' : 'mk-down';
      const sSign = strikeDiff >= 0 ? '+' : '';
      const tc = TIER_COLORS[c.tier] || {color:'#8b95a5', bg:'transparent'};
      const rowBg = i === 0 ? 'background:rgba(79,195,247,0.08)' : '';
      return `<tr style="${rowBg}">
        <td style="${td};text-align:left;padding-left:14px;color:#c8d0dc;font-weight:bold">${c.date}</td>
        <td style="${td};text-align:center"><span style="color:${tc.color};border:1px solid ${tc.color};border-radius:4px;padding:1px 6px;font-size:11px;font-weight:bold">${c.tier} ${c.otm}%</span> <span style="color:${tc.color};font-size:11px">${TIER_NAMES[c.tier] || ''}</span></td>
        <td style="${td};text-align:left;color:#4fc3f7;font-weight:bold">${c.symbol}</td>
        <td style="${td};text-align:right;color:#ce93d8;font-weight:bold">${c.price != null ? '$' + c.price.toFixed(2) : '-'}</td>
        <td style="${td};text-align:right;color:#ffc107">${dte}</td>
        <td style="${td};text-align:center">${miniCandles(c.pre_bars || [], c.post_bars || [])}</td>
        <td class="${sCls}" style="${td};text-align:right;font-weight:bold;padding-right:14px">${sSign}${strikeDiff.toFixed(2)}%</td>
      </tr>`;
    }).join('');
    const th = 'padding:4px 8px;border-bottom:1px solid #253044';
    contractHtml = `
    <table style="width:100%;font-size:13px;border-collapse:collapse;margin-top:6px">
      <thead><tr style="color:#546e7a;font-size:11px">
        <th style="${th};text-align:left;padding-left:14px">日期</th>
        <th style="${th};text-align:center">层级</th>
        <th style="${th};text-align:left">合约</th>
        <th style="${th};text-align:right">权利金</th>
        <th style="${th};text-align:right">DTE</th>
        <th style="${th};text-align:center">日K</th>
        <th style="${th};text-align:right;padding-right:14px">涨跌幅</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }
  el.innerHTML = `
    <div style="display:flex;align-items:baseline;gap:20px;padding:10px 14px">
      <span class="mk-date">${market.date}</span>
      <span class="mk-item">收盘价</span>
      <span class="mk-price">${market.close.toFixed(2)}</span>
      <span class="mk-change ${cls}">${sign}${market.change_pct.toFixed(2)}%</span>
      ${market.iv != null ? `<span class="mk-item">IV <span class="mk-val" style="color:#ce93d8;font-weight:bold">${market.iv.toFixed(1)}%</span></span>` : ''}
    </div>${contractHtml}`;
}

/* ===== 渲染：日K + MACD 图表（lightweight-charts） ===== */
function renderCharts(dailyBars) {
  if (!dailyBars || dailyBars.length === 0 || typeof LightweightCharts === 'undefined') return;

  const klineEl = document.getElementById('klineChart');
  const macdEl = document.getElementById('macdChart');
  klineEl.style.height = '260px';
  macdEl.style.height = '130px';

  const klineHeight = 260;
  const macdHeight = 130;

  // 中文月份映射
  const zhMonths = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  // 通用图表配置
  const chartOptions = {
    autoSize: true,
    layout: { background: { color: '#141b2d' }, textColor: '#8b95a5', fontSize: 11, attributionLogo: false },
    grid: { vertLines: { color: '#1e2a3a' }, horzLines: { color: '#1e2a3a' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    handleScroll: false,
    handleScale: false,
    timeScale: {
      borderColor: '#253044', timeVisible: false, rightOffset: 1,
      fixLeftEdge: true, fixRightEdge: true,
      tickMarkFormatter: (time) => {
        if (typeof time === 'string') {
          const p = time.split('-');
          return `${parseInt(p[1])}/${parseInt(p[2])}`;
        }
        return time;
      },
    },
    rightPriceScale: { borderColor: '#253044' },
    localization: {
      locale: 'zh-CN',
      timeFormatter: (t) => {
        if (typeof t === 'string') {
          const p = t.split('-');
          return `${p[0]}年${parseInt(p[1])}月${parseInt(p[2])}日`;
        }
        if (typeof t === 'object' && t.year) {
          return `${t.year}年${t.month}月${t.day}日`;
        }
        const d = new Date(t * 1000);
        return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
      },
    },
  };

  // ---- K线图 ----
  const kChart = LightweightCharts.createChart(klineEl, chartOptions);
  const candleSeries = kChart.addCandlestickSeries({
    upColor: '#4caf50', downColor: '#ef5350',
    borderUpColor: '#4caf50', borderDownColor: '#ef5350',
    wickUpColor: '#4caf50', wickDownColor: '#ef5350',
  });

  const candleData = dailyBars.map(b => ({
    time: b.date, open: b.open, high: b.high, low: b.low, close: b.close,
  }));
  candleSeries.setData(candleData);

  // ---- 移动均线 MA5 / MA10 / MA20 ----
  const maConfigs = [
    { key: 'ma5',  color: '#f5c878', width: 1 },
    { key: 'ma10', color: '#42a5f5', width: 1 },
    { key: 'ma20', color: '#ab47bc', width: 1 },
    { key: 'ma60', color: '#26a69a', width: 1 },
  ];
  maConfigs.forEach(cfg => {
    const s = kChart.addLineSeries({
      color: cfg.color, lineWidth: cfg.width,
      priceLineVisible: false, lastValueVisible: false,
      crosshairMarkerVisible: false,
    });
    s.setData(dailyBars.filter(b => b[cfg.key] != null).map(b => ({
      time: b.date, value: b[cfg.key],
    })));
  });

  // ---- 均线金叉 + 放量确认标记 ----
  // 短期均线（5/10）上穿长期均线（20/60），且当日成交量 > 1.2 × 20日均量
  const crossMarkers = [];
  const shortKeys = ['ma5', 'ma10'];
  const longKeys = ['ma20', 'ma60'];
  for (let i = 1; i < dailyBars.length; i++) {
    const cur = dailyBars[i], prev = dailyBars[i - 1];
    if (cur.vol_ma20 == null || cur.volume == null) continue;
    const volConfirm = cur.volume > cur.vol_ma20 * 1.2;
    if (!volConfirm) continue;
    for (const sk of shortKeys) {
      for (const lk of longKeys) {
        if (cur[sk] == null || cur[lk] == null || prev[sk] == null || prev[lk] == null) continue;
        // 上穿：前一天短线 <= 长线，今天短线 > 长线
        if (prev[sk] <= prev[lk] && cur[sk] > cur[lk]) {
          crossMarkers.push({
            time: cur.date,
            position: 'belowBar',
            color: '#4caf50',
            shape: 'text',
            text: '✓',
            size: 1,
          });
          break; // 同一天只标一个
        }
      }
      if (crossMarkers.length && crossMarkers[crossMarkers.length - 1].time === cur.date) break;
    }
  }
  crossMarkers.sort((a, b) => a.time < b.time ? -1 : a.time > b.time ? 1 : 0);
  candleSeries.setMarkers(crossMarkers);

  // 成交量（叠加在K线图底部）
  const volumeSeries = kChart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'volume',
  });
  kChart.priceScale('volume').applyOptions({
    scaleMargins: { top: 0.8, bottom: 0 },
  });
  volumeSeries.setData(dailyBars.map(b => ({
    time: b.date,
    value: b.volume,
    color: b.close >= b.open ? 'rgba(76,175,80,0.3)' : 'rgba(239,83,80,0.3)',
  })));

  // ---- MACD 图 ----
  const mChart = LightweightCharts.createChart(macdEl, chartOptions);

  // MACD 柱状图（红绿柱）
  const macdHistSeries = mChart.addHistogramSeries({
    priceScaleId: 'macd',
    priceFormat: { type: 'price', precision: 4, minMove: 0.0001 },
  });
  macdHistSeries.setData(dailyBars.filter(b => b.macd != null).map(b => ({
    time: b.date,
    value: b.macd,
    color: b.macd >= 0 ? '#4caf50' : '#ef5350',
  })));

  // DIF 线
  const difSeries = mChart.addLineSeries({
    color: '#4fc3f7', lineWidth: 1.5,
    priceScaleId: 'macd',
    priceFormat: { type: 'price', precision: 4, minMove: 0.0001 },
  });
  difSeries.setData(dailyBars.filter(b => b.dif != null).map(b => ({
    time: b.date, value: b.dif,
  })));

  // DEA 线
  const deaSeries = mChart.addLineSeries({
    color: '#ffa726', lineWidth: 1.5,
    priceScaleId: 'macd',
    priceFormat: { type: 'price', precision: 4, minMove: 0.0001 },
  });
  deaSeries.setData(dailyBars.filter(b => b.dea != null).map(b => ({
    time: b.date, value: b.dea,
  })));

  // ---- IV 图 ----
  const ivEl = document.getElementById('ivChart');
  ivEl.style.height = '100px';
  const ivChart = LightweightCharts.createChart(ivEl, chartOptions);
  const ivSeries = ivChart.addLineSeries({
    color: '#ce93d8', lineWidth: 1.5,
    priceFormat: { type: 'price', precision: 1, minMove: 0.1 },
    lastValueVisible: true, priceLineVisible: false,
  });
  const ivData = dailyBars.filter(b => b.iv != null).map(b => ({
    time: b.date, value: b.iv,
  }));
  ivSeries.setData(ivData);

  // ---- 图例更新函数 ----
  // 按日期索引数据，方便查找
  const barByDate = {};
  const prevBarByDate = {};
  dailyBars.forEach((b, i) => { barByDate[b.date] = b; if (i > 0) prevBarByDate[b.date] = dailyBars[i - 1]; });
  const lastBar = dailyBars[dailyBars.length - 1];

  function updateKlineLegend(bar) {
    if (!bar) return;
    // 日涨跌幅：vs 前一日收盘
    const prev = prevBarByDate[bar.date];
    const chg = prev ? ((bar.close - prev.close) / prev.close * 100) : 0;
    const chgColor = chg >= 0 ? '#4caf50' : '#ef5350';
    const chgSign = chg >= 0 ? '+' : '';
    const ma5 = bar.ma5 != null ? bar.ma5.toFixed(2) : '-';
    const ma10 = bar.ma10 != null ? bar.ma10.toFixed(2) : '-';
    const ma20 = bar.ma20 != null ? bar.ma20.toFixed(2) : '-';
    const ma60 = bar.ma60 != null ? bar.ma60.toFixed(2) : '-';
    document.getElementById('klineLegend').innerHTML = `
      <span class="chart-legend-title">日K</span>
      <span class="lg-item"><span class="lg-label">开</span><span class="lg-val" style="color:#c8d0dc">${bar.open.toFixed(2)}</span></span>
      <span class="lg-item"><span class="lg-label">高</span><span class="lg-val" style="color:#4caf50">${bar.high.toFixed(2)}</span></span>
      <span class="lg-item"><span class="lg-label">低</span><span class="lg-val" style="color:#ef5350">${bar.low.toFixed(2)}</span></span>
      <span class="lg-item"><span class="lg-label">收</span><span class="lg-val" style="color:${chgColor}">${bar.close.toFixed(2)}</span></span>
      <span class="lg-item"><span class="lg-val" style="color:${chgColor};font-size:10px">${chgSign}${chg.toFixed(2)}%</span></span>
      <span class="lg-item"><span class="lg-label" style="color:#f5c878">MA5</span><span class="lg-val" style="color:#f5c878">${ma5}</span></span>
      <span class="lg-item"><span class="lg-label" style="color:#42a5f5">MA10</span><span class="lg-val" style="color:#42a5f5">${ma10}</span></span>
      <span class="lg-item"><span class="lg-label" style="color:#ab47bc">MA20</span><span class="lg-val" style="color:#ab47bc">${ma20}</span></span>
      <span class="lg-item"><span class="lg-label" style="color:#26a69a">MA60</span><span class="lg-val" style="color:#26a69a">${ma60}</span></span>`;
  }

  function updateMacdLegend(bar) {
    if (!bar) return;
    const difColor = bar.dif >= 0 ? '#4caf50' : '#ef5350';
    const deaColor = bar.dea >= 0 ? '#4caf50' : '#ef5350';
    const macdColor = bar.macd >= 0 ? '#4caf50' : '#ef5350';
    document.getElementById('macdLegend').innerHTML = `
      <span class="chart-legend-title">MACD</span>
      <span class="lg-item"><span class="lg-label" style="color:#4fc3f7">DIF</span><span class="lg-val" style="color:#4fc3f7">${bar.dif != null ? bar.dif.toFixed(4) : '-'}</span></span>
      <span class="lg-item"><span class="lg-label" style="color:#ffa726">DEA</span><span class="lg-val" style="color:#ffa726">${bar.dea != null ? bar.dea.toFixed(4) : '-'}</span></span>
      <span class="lg-item"><span class="lg-label">MACD</span><span class="lg-val" style="color:${macdColor}">${bar.macd != null ? bar.macd.toFixed(4) : '-'}</span></span>`;
  }

  function updateIvLegend(bar) {
    if (!bar) return;
    const ivVal = bar.iv != null ? bar.iv.toFixed(1) + '%' : '-';
    document.getElementById('ivLegend').innerHTML = `
      <span class="chart-legend-title">IV</span>
      <span class="lg-item"><span class="lg-label" style="color:#ce93d8">IV</span><span class="lg-val" style="color:#ce93d8">${ivVal}</span></span>`;
  }

  // 默认显示最新一天数据
  updateKlineLegend(lastBar);
  updateMacdLegend(lastBar);
  updateIvLegend(lastBar);

  // ---- 十字光标同步 + 图例联动（K线 / MACD / IV 三图联动） ----
  let syncing = false;
  function syncCrosshair(sourceChart, param) {
    if (syncing) return;
    syncing = true;
    const charts = [
      { chart: kChart, series: candleSeries },
      { chart: mChart, series: macdHistSeries },
      { chart: ivChart, series: ivSeries },
    ];
    if (param.time) {
      charts.forEach(c => { if (c.chart !== sourceChart) c.chart.setCrosshairPosition(0, param.time, c.series); });
      const b = barByDate[param.time];
      if (b) { updateKlineLegend(b); updateMacdLegend(b); updateIvLegend(b); }
    } else {
      charts.forEach(c => { if (c.chart !== sourceChart) c.chart.clearCrosshairPosition(); });
      updateKlineLegend(lastBar);
      updateMacdLegend(lastBar);
      updateIvLegend(lastBar);
    }
    syncing = false;
  }
  kChart.subscribeCrosshairMove(param => syncCrosshair(kChart, param));
  mChart.subscribeCrosshairMove(param => syncCrosshair(mChart, param));
  ivChart.subscribeCrosshairMove(param => syncCrosshair(ivChart, param));

  // ---- 时间轴同步锁定（K线 / MACD / IV 三图联动） ----
  const allCharts = [kChart, mChart, ivChart];
  let syncingRange = false;
  allCharts.forEach(src => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncingRange || !range) return;
      syncingRange = true;
      allCharts.forEach(c => { if (c !== src) c.timeScale().setVisibleLogicalRange(range); });
      syncingRange = false;
    });
  });

  // 等布局完成后，强制设置显示全部 30 根 K 线
  requestAnimationFrame(() => {
    const fullRange = { from: -1, to: dailyBars.length };
    allCharts.forEach(c => c.timeScale().setVisibleLogicalRange(fullRange));
  });

}

function toggleTier(t) {
  if (activeTiers.has(t)) activeTiers.delete(t); else activeTiers.add(t);
  renderFilter();
  renderTable(currentWeeks);
}

/* ===== 点击层级卡片筛选 ===== */
function filterByTier(t) {
  const allTiers = ['A','B1','B2','B3','B4','C1','C2','C3','C4'];
  // 若当前只激活了该层级，则恢复全部
  if (activeTiers.size === 1 && activeTiers.has(t)) {
    allTiers.forEach(x => activeTiers.add(x));

    activeTiers.clear();
    activeTiers.add(t);

  renderTable(currentWeeks);
}

/* ===== 排序状态 ===== */
let sortKey = null;
let sortDir = 'desc';

function sortTable(key) {
  if (sortKey === key) {
    if (sortDir === 'desc') sortDir = 'asc';
    else { sortKey = null; sortDir = 'desc'; }
  } else {
    sortKey = key;
    sortDir = 'desc';
  }
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (sortKey && th.dataset.sort === sortKey) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
  renderTable(currentWeeks);
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => sortTable(th.dataset.sort));
  });
});

/* ===== 渲染：逐周表格 ===== */
/* 迷你蜡烛图 SVG：左=入场前20天+入场日，竖线分隔，右=入场后到到期日 */
function miniCandles(preBars, postBars) {
  if ((!preBars || preBars.length === 0) && (!postBars || postBars.length === 0)) return '-';
  const pre = preBars || [], post = postBars || [];
  const all = [...pre, ...post];
  const gap = 1, bw = 2, sepW = 3;
  const maxPre = 21, maxPost = 20; // 固定槽位：左21根 + 右20根
  const fixedW = (maxPre + maxPost) * (bw + gap) + gap + sepW;
  const H = 28, pad = 2;
  const allHL = all.flatMap(b => [b.h, b.l]);
  const hi = Math.max(...allHL), lo = Math.min(...allHL);
  const range = hi - lo || 1;
  const y = v => pad + (hi - v) / range * (H - pad * 2);
  let svg = `<svg width="${fixedW}" height="${H}" style="vertical-align:middle">`;
  // 左侧：右对齐到分隔线，不足的左侧留空
  const preOffset = (maxPre - pre.length) * (bw + gap);
  pre.forEach((b, i) => {
    const x = gap + preOffset + i * (bw + gap);
    const cx = x + bw / 2;
    const color = b.c >= b.o ? '#4caf50' : '#ef5350';
    const bodyTop = y(Math.max(b.o, b.c)), bodyBot = y(Math.min(b.o, b.c));
    svg += `<line x1="${cx}" y1="${y(b.h)}" x2="${cx}" y2="${y(b.l)}" stroke="${color}" stroke-width="1"/>`;
    svg += `<rect x="${x}" y="${bodyTop}" width="${bw}" height="${Math.max(bodyBot - bodyTop, 1)}" fill="${color}" rx="0.5"/>`;
  });
  // 分隔竖线：固定位置
  const sepX = gap + maxPre * (bw + gap) + sepW / 2;
  svg += `<line x1="${sepX}" y1="0" x2="${sepX}" y2="${H}" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="2,2"/>`;
  // 右侧：左对齐从分隔线开始
  const postOffset = gap + maxPre * (bw + gap) + sepW;
  post.forEach((b, i) => {
    const x = postOffset + i * (bw + gap);
    const cx = x + bw / 2;
    const color = b.c >= b.o ? '#4caf50' : '#ef5350';
    const bodyTop = y(Math.max(b.o, b.c)), bodyBot = y(Math.min(b.o, b.c));
    svg += `<line x1="${cx}" y1="${y(b.h)}" x2="${cx}" y2="${y(b.l)}" stroke="${color}" stroke-width="1"/>`;
    svg += `<rect x="${x}" y="${bodyTop}" width="${bw}" height="${Math.max(bodyBot - bodyTop, 1)}" fill="${color}" rx="0.5"/>`;
  });
  svg += '</svg>';
  return svg;
}

function renderTable(weeks) {
  currentWeeks = weeks;
  let filtered = weeks.filter(w => activeTiers.has(w.tier || 'C') && !(hideSkip && w.skip));
  if (sortKey) {
    filtered = [...filtered].sort((a, b) => {
      const va = a[sortKey] != null ? a[sortKey] : -Infinity;
      const vb = b[sortKey] != null ? b[sortKey] : -Infinity;
      return sortDir === 'asc' ? va - vb : vb - va;
    });
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const rows = filtered.map((w, idx) => {
    const isPending = w.pending === true;
    const tc = TIER_COLORS[w.tier];
    const printHide = idx >= 8 ? ' print-hide-row' : '';

    // 距到期日剩余天数：到期当天=1天，到期次日=0天
    let pendingText = '<span class="pending-text">进行中</span>';
    if (isPending && w.expiry_date) {
      const expiry = new Date(w.expiry_date + 'T00:00:00');
      const diff = Math.ceil((expiry - today) / 86400000);
      const daysLeft = Math.max(0, diff + 1);  // 到期当天 diff=0 → 1天；次日 diff=-1 → 0天
      pendingText = `<span class="pending-text">还剩<span style="color:#4fc3f7;font-weight:bold">${daysLeft}</span>天</span>`;
    }

    const rowBg = tc ? tc.bg : 'transparent';
    const isSkip = w.skip === true;
    const pendingBorder = isPending ? ';border-left:3px solid #5c6bc0' : isSkip ? ';border-left:3px solid #ef5350' : '';

    const tierTag = tc
      ? isSkip
        ? `<span class="tag" style="background:#1a0a0a;color:#ef5350;border:1px solid #ef5350;text-decoration:line-through">${w.tier} ${w.otm}%</span>`
        : `<span class="tag" style="background:${tc.bg};color:${tc.color};border:1px solid ${tc.color}">${w.tier} ${w.otm}%</span>`
      : w.tier;

    // 期权合约列：合约名 + DTE
    let optCell;
    if (w.option_symbol) {
      optCell = `<span style="color:#4fc3f7;font-size:11px">${w.option_symbol}</span><br><span style="color:#6b7b8d;font-size:10px">DTE ${w.option_dte}天</span>`;
    } else if (isPending) {
      optCell = pendingText;
    } else {
      optCell = '<span style="color:#546e7a;font-size:10px">无数据</span>';
    }


    let expiryCloseCell;
    if (w.expiry_close != null) {
      expiryCloseCell = fmt(w.expiry_close);
    } else if (isPending) {
      expiryCloseCell = pendingText;
    } else {
      expiryCloseCell = '-';
    }

    let settleDiffCell;
    if (w.settle_diff != null) {
      const diffColor = w.settle_diff > 0 ? '#4caf50' : '#ef5350';
      const diffSign = w.settle_diff > 0 ? '+' : '';
      settleDiffCell = `<span style="color:${diffColor};font-weight:bold">${diffSign}${w.settle_diff.toFixed(2)}%</span>`;
    } else if (isPending) {
      settleDiffCell = pendingText;
    } else {
      settleDiffCell = '-';
    }

    let safeCell;
    if (w.safe_expiry === true) {
      safeCell = '<span style="color:#4caf50;font-size:16px">✓</span>';
    } else if (w.safe_expiry === false) {
      safeCell = '<span style="color:#ef5350;font-size:16px">✗</span>';
    } else if (isPending) {
      safeCell = pendingText;
    } else {
      safeCell = '-';
    }

    return `<tr class="${printHide}" data-week-idx="${idx}" style="background:${rowBg}${pendingBorder}">
      <td>${w.date}</td>
      <td>${tierTag}</td>
      <td>${w.otm != null ? w.otm + '%' : '-'}</td>
      <td>${fmt(w.close)}</td>
      <td>${optCell}</td>
      <td>${w.option_price != null ? `<span style="color:#ce93d8">$${w.option_price.toFixed(2)}</span>` : (isPending ? pendingText : '-')}</td>
      <td>${miniCandles(w.pre_bars, w.post_bars)}</td>
      <td>${expiryCloseCell}</td>
      <td>${settleDiffCell}</td>
      <td>${safeCell}</td>
      <td>${w.recovery_days != null ? `<span style="color:#ef5350;font-weight:bold">${w.recovery_days}</span><span style="color:#6b7b8d;font-size:10px">天</span>` : (w.safe_expiry === false ? `<span style="color:#ef5350">未恢复[${w.recovery_gap != null ? w.recovery_gap.toFixed(1) + '%' : '-'}]</span>` : (isPending ? pendingText : '-'))}</td>
      <td>${w.iv != null ? `<span style="color:#ce93d8">${w.iv.toFixed(1)}%</span>` : '-'}</td>
    </tr>`;
  });

  document.getElementById('weeklyBody').innerHTML = rows.join('');

  // 绑定悬浮决策面板事件（仅日期列，停留 2 秒后显示）
  const tooltip = document.getElementById('decisionTooltip');
  let hoverTimer = null;
  document.querySelectorAll('#weeklyBody tr[data-week-idx] td:first-child').forEach(td => {
    td.style.cursor = 'help';
    const tr = td.parentElement;
    td.addEventListener('mouseenter', (e) => {
      hoverTimer = setTimeout(() => {
        const w = filtered[parseInt(tr.dataset.weekIdx)];
        if (!w || !w.rules) return;
        tooltip.innerHTML = buildDecisionHtml(w, '决策');
        tooltip.classList.add('visible');
        positionTooltip(e, tooltip);
      }, 2000);
    });
    td.addEventListener('mousemove', (e) => {
      if (tooltip.classList.contains('visible')) positionTooltip(e, tooltip);
    });
    td.addEventListener('mouseleave', () => {
      clearTimeout(hoverTimer);
      hoverTimer = null;
      tooltip.classList.remove('visible');
    });
  });
}

/* 定位悬浮面板：跟随鼠标，避免超出视口 */
function positionTooltip(e, tooltip) {
  const pad = 16;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + tw > window.innerWidth - pad) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

/* ===== 内嵌数据（由 run.py 自动写入） ===== */
const EMBEDDED_DATA = {};
/* EMBEDDED_DATA_PLACEHOLDER */

/* ===== 加载数据 ===== */
function loadData() {
  const tickers = Object.keys(EMBEDDED_DATA);
  if (tickers.length > 0) {
    renderData(EMBEDDED_DATA[tickers[0]]);
    return;
  }
  const match = location.pathname.match(/([A-Z0-9]+)\.html$/);
  const ticker = match ? match[1] : 'TQQQ';
  fetch(ticker + '.json')
    .then(res => {
      if (!res.ok) throw new Error('无法加载 ' + ticker + '.json（需运行 run.py 或启动本地服务器）');
      return res.json();
    })
    .then(data => renderData(data))
    .catch(err => {
      console.error(err);
      document.getElementById('overviewRow').innerHTML = `<div class="stat"><span class="v red">加载失败</span><span class="d">${err.message}</span></div>`;
    });
}

function renderData(data) {
  document.getElementById('tickerName').textContent = data.ticker || '';
  const otm = data.otm_config || {otm_a: 0.10, otm_b: 0.10, otm_c: 0.10};
  renderOverview(data.summary, data.tiers);
  renderMarketBar(data.market);
  renderFilter();
  renderTable(data.weeks);
  // 渲染图表（等 lightweight-charts 加载完成）
  if (typeof LightweightCharts !== 'undefined') {
    renderCharts(data.daily_bars);
  } else {
    // 等待脚本加载
    const waitChart = setInterval(() => {
      if (typeof LightweightCharts !== 'undefined') {
        clearInterval(waitChart);
        renderCharts(data.daily_bars);
      }
    }, 100);
    // 5秒超时
    setTimeout(() => clearInterval(waitChart), 5000);
  }
}

/* ===== 导出 PNG ===== */
function exportPng() {
  const btn = document.querySelector('.header button');
  btn.textContent = '导出中...';
  btn.disabled = true;

  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:1500px;background:#0a0e17;padding:20px;color:#c8d0dc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.6';

  const ticker = document.getElementById('tickerName').textContent || 'TQQQ';
  const headerHtml = `<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
    <span style="color:#e8ecf1;font-size:26px;font-weight:bold">Lambda 策略系统</span>
    <span style="color:#4fc3f7;font-size:20px;font-weight:bold">${ticker}</span>
  </div>`;
  tmp.innerHTML = headerHtml;

  tmp.appendChild(document.getElementById('overviewRow').cloneNode(true));

  const grid = document.querySelector('.decision-grid');
  tmp.appendChild(grid.cloneNode(true));

  const label = document.createElement('div');
  label.style.cssText = 'color:#8b95a5;font-size:14px;margin:16px 0 8px';
  label.textContent = '最近 8 周策略';
  tmp.appendChild(label);

  const tableWrap = document.createElement('div');
  const origTable = document.querySelector('table.weekly');
  const tbl = origTable.cloneNode(true);
  const tbody = tbl.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.forEach((r, i) => { if (i >= 8) r.remove(); });
  tableWrap.appendChild(tbl);
  tmp.appendChild(tableWrap);

  tmp.appendChild(document.querySelector('.risk-note').cloneNode(true));

  document.body.appendChild(tmp);

  html2canvas(tmp, {
    backgroundColor: '#0a0e17',
    scale: 2,
    useCORS: true,
    width: 1500,
    windowWidth: 1500,
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `lambda-${ticker}-${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(err => {
    console.error('导出失败:', err);
    alert('导出失败: ' + err.message);
  }).finally(() => {
    document.body.removeChild(tmp);
    btn.textContent = '导出';
    btn.disabled = false;
  });
}
